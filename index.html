<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Font Pair — Find Perfect Font Combinations</title>
<meta name="description" content="Browse curated Google Font pairings. See heading + body combinations live. Copy CSS. Free, instant, no signup.">
<meta property="og:title" content="Font Pair — Find Perfect Font Combinations">
<meta property="og:description" content="Curated Google Font pairings. Preview live, copy CSS.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/font-pair/">
<meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}
.filters{display:flex;gap:8px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.filter-btn{padding:8px 16px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.82rem;cursor:pointer;font-weight:600}
.filter-btn.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.filter-btn:hover:not(.active){background:#1c1c1c}
.pair-grid{display:flex;flex-direction:column;gap:20px;margin-bottom:32px}
.pair-card{background:#161616;border:1px solid #222;border-radius:14px;overflow:hidden;transition:border-color 0.2s}
.pair-card:hover{border-color:#333}
.pair-preview{padding:32px 28px;min-height:180px;position:relative;cursor:pointer}
.pair-preview h2{margin-bottom:12px;line-height:1.2}
.pair-preview p{line-height:1.7;color:#aaa}
.pair-meta{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#111;border-top:1px solid #1a1a1a;flex-wrap:wrap;gap:8px}
.pair-fonts{font-size:0.82rem;color:#888}
.pair-fonts span{color:#ccc;font-weight:600}
.pair-category{font-size:0.72rem;color:#555;background:#1a1a1a;padding:4px 10px;border-radius:12px}
.pair-actions{display:flex;gap:6px}
.pair-actions button{padding:6px 14px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#888;font-size:0.75rem;cursor:pointer}
.pair-actions button:hover{border-color:#555;color:#ccc}
.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

.custom-section{background:#161616;border:1px solid #222;border-radius:14px;padding:24px;margin-bottom:32px}
.custom-section h2{font-size:1.1rem;color:#ccc;margin-bottom:16px}
.custom-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.custom-row label{font-size:0.82rem;color:#888;display:flex;flex-direction:column;gap:4px;flex:1;min-width:200px}
.custom-row select,.custom-row input{padding:10px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#fff;font-size:0.9rem;outline:none}
.custom-row select:focus,.custom-row input:focus{border-color:#3b82f6}
.custom-preview{padding:24px;background:#0a0a0a;border-radius:10px;border:1px solid #1a1a1a;margin-top:12px}

.theme-toggle{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid #333;margin-bottom:20px;width:fit-content;margin-left:auto;margin-right:auto}
.theme-btn{padding:8px 16px;background:#161616;color:#888;font-size:0.8rem;cursor:pointer;border:none;font-weight:600}
.theme-btn.active{background:#1a2744;color:#4da6ff}

footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:600px){.pair-preview{padding:20px 18px}.pair-meta{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="container">
<h1>Font Pair</h1>
<p class="subtitle">Curated Google Font pairings. Click any to preview and copy CSS.</p>

<div class="theme-toggle">
  <button class="theme-btn active" onclick="setTheme('dark')">Dark</button>
  <button class="theme-btn" onclick="setTheme('light')">Light</button>
</div>

<div class="filters" id="filters"></div>
<div class="pair-grid" id="pairGrid"></div>

<div class="custom-section">
  <h2>Custom Pairing</h2>
  <div class="custom-row">
    <label>Heading Font
      <select id="customHeading" onchange="updateCustom()"></select>
    </label>
    <label>Body Font
      <select id="customBody" onchange="updateCustom()"></select>
    </label>
    <label>Heading Size
      <input type="range" id="customSize" min="20" max="60" value="36" onchange="updateCustom()" oninput="updateCustom()">
    </label>
  </div>
  <div class="custom-preview" id="customPreview"></div>
  <div style="text-align:right;margin-top:8px">
    <button class="filter-btn" onclick="copyCustomCSS()">Copy CSS</button>
  </div>
</div>

</div>

<footer>
  <a href="https://github.com/yurukusa/font-pair">GitHub</a> ·
  Also: <a href="https://yurukusa.github.io/color-palette/">Color Palette</a> ·
  <a href="https://yurukusa.github.io/gh-stats/">gh-stats</a> ·
  <a href="https://yurukusa.github.io/readme-score/">README Score</a>
</footer>

<script>
let currentTheme='dark';

const PAIRS=[
  {heading:'Playfair Display',body:'Source Sans 3',cat:'elegant',desc:'Classic editorial. Serif heading with clean sans body.'},
  {heading:'Montserrat',body:'Merriweather',cat:'modern',desc:'Geometric sans heading with readable serif body.'},
  {heading:'Oswald',body:'Quattrocento',cat:'bold',desc:'Condensed bold heading with traditional serif body.'},
  {heading:'Raleway',body:'Lato',cat:'minimal',desc:'Thin elegant heading with friendly sans body.'},
  {heading:'Roboto Slab',body:'Roboto',cat:'tech',desc:'Slab serif heading with its sans companion. Google Material.'},
  {heading:'Poppins',body:'Inter',cat:'modern',desc:'Rounded geometric heading with versatile sans body.'},
  {heading:'DM Serif Display',body:'DM Sans',cat:'elegant',desc:'High-contrast serif with matching sans. Same design family.'},
  {heading:'Space Grotesk',body:'Space Mono',cat:'tech',desc:'Proportional + monospace from the same family. Code-friendly.'},
  {heading:'Archivo Black',body:'Archivo',cat:'bold',desc:'Heavy impact heading with neutral body. Same family, max contrast.'},
  {heading:'Libre Baskerville',body:'Source Sans 3',cat:'elegant',desc:'Traditional Baskerville serif with modern sans body.'},
  {heading:'Work Sans',body:'Bitter',cat:'minimal',desc:'Clean geometric sans heading with slab serif body.'},
  {heading:'Nunito',body:'Nunito Sans',cat:'friendly',desc:'Rounded + non-rounded from same family. Soft and approachable.'},
  {heading:'Bebas Neue',body:'Open Sans',cat:'bold',desc:'All-caps condensed heading with widely-used sans body.'},
  {heading:'Cormorant Garamond',body:'Proza Libre',cat:'elegant',desc:'Elegant display serif with humanist sans. Editorial luxury.'},
  {heading:'IBM Plex Sans',body:'IBM Plex Serif',cat:'tech',desc:'IBM design system pairing. Professional and structured.'},
  {heading:'Outfit',body:'Newsreader',cat:'modern',desc:'Modern geometric sans with variable optical-size serif.'},
  {heading:'Sora',body:'Noto Sans',cat:'minimal',desc:'Japanese-inspired sans heading with universal body font.'},
  {heading:'Fraunces',body:'Commissioner',cat:'friendly',desc:'Playful "wonky" serif with variable geometric sans.'},
  {heading:'Lexend',body:'Source Serif 4',cat:'minimal',desc:'Readability-optimized sans heading with classic serif body.'},
  {heading:'JetBrains Mono',body:'Inter',cat:'tech',desc:'Developer monospace heading with versatile sans body.'},
];

const CATEGORIES=[
  {id:'all',label:'All'},
  {id:'elegant',label:'Elegant'},
  {id:'modern',label:'Modern'},
  {id:'bold',label:'Bold'},
  {id:'minimal',label:'Minimal'},
  {id:'tech',label:'Tech'},
  {id:'friendly',label:'Friendly'},
];

const SAMPLE_HEADING='The quick brown fox jumps over the lazy dog';
const SAMPLE_BODY='Typography is the art and technique of arranging type to make written language legible, readable, and appealing when displayed. Good typography establishes a strong visual hierarchy, provides a graphic balance to the page, and sets the overall tone of the product.';

let activeFilter='all';

// Load all Google Fonts
function loadFonts(){
  const fonts=[...new Set(PAIRS.flatMap(p=>[p.heading,p.body]))];
  const link=document.createElement('link');
  link.rel='stylesheet';
  link.href=`https://fonts.googleapis.com/css2?${fonts.map(f=>`family=${encodeURIComponent(f)}:wght@400;700`).join('&')}&display=swap`;
  document.head.appendChild(link);
}
loadFonts();

function setTheme(t){
  currentTheme=t;
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.theme-btn')[t==='dark'?0:1].classList.add('active');
  renderPairs();
  updateCustom();
}

function renderFilters(){
  document.getElementById('filters').innerHTML=CATEGORIES.map(c=>
    `<button class="filter-btn ${c.id===activeFilter?'active':''}" onclick="setFilter('${c.id}')">${c.label}</button>`
  ).join('');
}

function setFilter(id){
  activeFilter=id;
  renderFilters();
  renderPairs();
}

function renderPairs(){
  const filtered=activeFilter==='all'?PAIRS:PAIRS.filter(p=>p.cat===activeFilter);
  const bg=currentTheme==='dark'?'#161616':'#ffffff';
  const headingColor=currentTheme==='dark'?'#ffffff':'#111111';
  const bodyColor=currentTheme==='dark'?'#aaaaaa':'#555555';

  document.getElementById('pairGrid').innerHTML=filtered.map((p,i)=>`
    <div class="pair-card">
      <div class="pair-preview" style="background:${bg}" onclick="copyCSS('${p.heading}','${p.body}')">
        <h2 style="font-family:'${p.heading}',serif;font-size:2rem;color:${headingColor}">${SAMPLE_HEADING}</h2>
        <p style="font-family:'${p.body}',sans-serif;font-size:1rem;color:${bodyColor}">${SAMPLE_BODY}</p>
      </div>
      <div class="pair-meta">
        <div class="pair-fonts"><span>${p.heading}</span> + <span>${p.body}</span></div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="pair-category">${p.cat}</div>
          <div class="pair-actions">
            <button onclick="copyCSS('${p.heading}','${p.body}')">Copy CSS</button>
            <button onclick="copyImport('${p.heading}','${p.body}')">Copy Import</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function copyCSS(heading,body){
  const css=`/* Heading */\nfont-family: '${heading}', serif;\nfont-weight: 700;\n\n/* Body */\nfont-family: '${body}', sans-serif;\nfont-weight: 400;`;
  navigator.clipboard.writeText(css);
  showCopied('CSS copied!');
}

function copyImport(heading,body){
  const url=`@import url('https://fonts.googleapis.com/css2?family=${encodeURIComponent(heading)}:wght@700&family=${encodeURIComponent(body)}:wght@400;700&display=swap');`;
  navigator.clipboard.writeText(url);
  showCopied('Import URL copied!');
}

function showCopied(msg){
  const el=document.createElement('div');
  el.className='copied';
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

// Custom pairing
function initCustom(){
  const allFonts=[...new Set(PAIRS.flatMap(p=>[p.heading,p.body]))].sort();
  const hSel=document.getElementById('customHeading');
  const bSel=document.getElementById('customBody');
  allFonts.forEach(f=>{
    hSel.add(new Option(f,f));
    bSel.add(new Option(f,f));
  });
  hSel.value='Playfair Display';
  bSel.value='Source Sans 3';
  updateCustom();
}

function updateCustom(){
  const h=document.getElementById('customHeading').value;
  const b=document.getElementById('customBody').value;
  const size=document.getElementById('customSize').value;
  const bg=currentTheme==='dark'?'#0a0a0a':'#ffffff';
  const hColor=currentTheme==='dark'?'#ffffff':'#111111';
  const bColor=currentTheme==='dark'?'#aaaaaa':'#555555';

  document.getElementById('customPreview').style.background=bg;
  document.getElementById('customPreview').innerHTML=`
    <h2 style="font-family:'${h}',serif;font-size:${size}px;color:${hColor};margin-bottom:12px;line-height:1.2">${SAMPLE_HEADING}</h2>
    <p style="font-family:'${b}',sans-serif;font-size:16px;color:${bColor};line-height:1.7">${SAMPLE_BODY}</p>
  `;
}

function copyCustomCSS(){
  const h=document.getElementById('customHeading').value;
  const b=document.getElementById('customBody').value;
  const size=document.getElementById('customSize').value;
  const css=`@import url('https://fonts.googleapis.com/css2?family=${encodeURIComponent(h)}:wght@700&family=${encodeURIComponent(b)}:wght@400;700&display=swap');\n\nh1, h2, h3 {\n  font-family: '${h}', serif;\n  font-weight: 700;\n  font-size: ${size}px;\n}\n\nbody, p {\n  font-family: '${b}', sans-serif;\n  font-weight: 400;\n  font-size: 16px;\n  line-height: 1.7;\n}`;
  navigator.clipboard.writeText(css);
  showCopied('Custom CSS copied!');
}

// Init
renderFilters();
renderPairs();
initCustom();
</script>
</body>
</html>
